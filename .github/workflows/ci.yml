name: ci

on:
  push:
  pull_request:

jobs:
  user-space:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Build user-space tools
        run: make usercli labtop collector

      - name: Run host unit tests
        run: make ring-test abi-test

      - name: Check shell syntax
        run: bash -n demo.sh scripts/*.sh

      - name: Shellcheck scripts
        run: shellcheck demo.sh scripts/*.sh

      - name: CLI help smoke test
        run: |
          ./usercli help
          ./usercli version
          ./usercli --help

      - name: Optional kernel module build
        run: make kernel-build-check
