<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">labtop terminal monitor preview</title>
  <desc id="desc">A terminal-style preview of labtop showing module health, counters, event rates, and recent kernel events.</desc>
  <defs>
    <linearGradient id="frame" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .title { fill: #f8fafc; font-size: 22px; font-weight: 700; }
      .text { fill: #cbd5e1; font-size: 16px; }
      .dim { fill: #64748b; font-size: 15px; }
      .green { fill: #22c55e; }
      .cyan { fill: #06b6d4; }
      .amber { fill: #f59e0b; }
      .red { fill: #ef4444; }
      .panel { fill: #0f172a; stroke: #334155; stroke-width: 1.25; }
      .barbg { fill: #1e293b; }
      .bar { fill: #22c55e; }
      .bar2 { fill: #06b6d4; }
    </style>
  </defs>
  <rect width="1200" height="700" fill="#020617"/>
  <rect x="40" y="36" width="1120" height="628" rx="14" fill="url(#frame)" stroke="#1e293b"/>
  <circle cx="76" cy="68" r="7" fill="#ef4444"/>
  <circle cx="100" cy="68" r="7" fill="#f59e0b"/>
  <circle cx="124" cy="68" r="7" fill="#22c55e"/>
  <text x="156" y="75" class="mono dim">zion@kernel-proc-lab: labtop</text>

  <text x="72" y="126" class="mono title">kernel_proc_lab</text>
  <text x="306" y="126" class="mono green">READY</text>
  <text x="394" y="126" class="mono dim">version 0.8.0 · ABI 4 · /dev/kernel_proc_lab</text>

  <rect x="72" y="158" width="330" height="165" rx="8" class="panel"/>
  <text x="96" y="195" class="mono cyan">Module Counters</text>
  <text x="96" y="232" class="mono text">reads</text>
  <text x="262" y="232" class="mono green">128</text>
  <text x="96" y="264" class="mono text">writes</text>
  <text x="262" y="264" class="mono green">42</text>
  <text x="96" y="296" class="mono text">opens</text>
  <text x="262" y="296" class="mono green">17</text>

  <rect x="435" y="158" width="330" height="165" rx="8" class="panel"/>
  <text x="459" y="195" class="mono cyan">Event Ring</text>
  <text x="459" y="232" class="mono text">capacity</text>
  <text x="628" y="232" class="mono green">64</text>
  <text x="459" y="264" class="mono text">events</text>
  <text x="628" y="264" class="mono green">64 retained</text>
  <text x="459" y="296" class="mono text">drops</text>
  <text x="628" y="296" class="mono green">0</text>

  <rect x="798" y="158" width="330" height="165" rx="8" class="panel"/>
  <text x="822" y="195" class="mono cyan">System</text>
  <text x="822" y="232" class="mono text">cpu</text>
  <rect x="910" y="218" width="170" height="14" rx="7" class="barbg"/>
  <rect x="910" y="218" width="92" height="14" rx="7" class="bar"/>
  <text x="822" y="264" class="mono text">memory</text>
  <rect x="910" y="250" width="170" height="14" rx="7" class="barbg"/>
  <rect x="910" y="250" width="121" height="14" rx="7" class="bar2"/>
  <text x="822" y="296" class="mono text">load</text>
  <text x="910" y="296" class="mono green">0.72 0.81 0.86</text>

  <rect x="72" y="352" width="1056" height="236" rx="8" class="panel"/>
  <text x="96" y="390" class="mono cyan">Recent Kernel Events</text>
  <text x="96" y="428" class="mono dim">SEQ</text>
  <text x="168" y="428" class="mono dim">TYPE</text>
  <text x="278" y="428" class="mono dim">PID</text>
  <text x="378" y="428" class="mono dim">COMM</text>
  <text x="548" y="428" class="mono dim">MESSAGE</text>
  <text x="96" y="466" class="mono green">62</text>
  <text x="168" y="466" class="mono amber">write</text>
  <text x="278" y="466" class="mono text">75273</text>
  <text x="378" y="466" class="mono text">usercli</text>
  <text x="548" y="466" class="mono text">runtime smoke passed</text>
  <text x="96" y="504" class="mono green">63</text>
  <text x="168" y="504" class="mono amber">stream</text>
  <text x="278" y="504" class="mono text">75283</text>
  <text x="378" y="504" class="mono text">usercli</text>
  <text x="548" y="504" class="mono text">poll wakeup delivered</text>
  <text x="96" y="542" class="mono green">64</text>
  <text x="168" y="542" class="mono amber">collect</text>
  <text x="278" y="542" class="mono text">75291</text>
  <text x="378" y="542" class="mono text">collector</text>
  <text x="548" y="542" class="mono text">JSONL event persisted</text>

  <text x="72" y="626" class="mono dim">tabs: dashboard · modinfo · proc/sysfs · trace · dmesg · doctor · selftest · files</text>
</svg>
